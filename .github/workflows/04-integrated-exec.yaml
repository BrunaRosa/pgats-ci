# CI de Nível 04 - Pipeline Integrada ao Build do Código

# nome da pipeline
name: 'N4 -Execução Integrada'

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch
# gatilho agendado = schedule
# gatilho por conclusão de outra pipeline = workflow_run

on:
  workflow_dispatch:

  push:
    branches:
      - master
#tarefas dentro da pipeline = jobs

jobs:
  #nome do job
  inspecao:
    # maquina onde o job vai rodar
    runs-on: ubuntu-latest

    # passos do job
    steps:
      # clone do projeto
      - uses: actions/checkout@v4

      # instalção do node
      - uses: actions/setup-node@v4
        with:
          node-version: latest

      # instalação do Yarn
      - name: Instalando Yarn
        run: npm install -g yarn

      # instalação das dependências
      - name: Instalando dependências
        run: yarn

      - name: Inspeção de Código
        run: yarn lint

  unidade:
    runs-on: ubuntu-latest
    needs: [inspecao]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Instalando Yarn
        run: npm install -g yarn

      - name: Instalando dependências
        run: yarn

      - name: Rodando testes unitários
        run: yarn run test

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [inspecao]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Instalando Yarn
        run: npm install -g yarn

      - name: Instalando dependências
        run: yarn

      - name: Instalando Browsers do Playwright
        run: yarn playwright install

      - name: Executando testes E2E
        run: yarn run e2e

      - name: Salvando relatórios de testes
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          path: ./playwright-report
          name: Relatório de Testes E2E

  unidade-self-hosted:
    runs-on: [self-hosted, linux]
    needs: [inspecao]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Instalando Yarn
        run: npm install -g yarn

      - name: Instalando dependências
        run: yarn

      - name: Rodando testes unitários (self-hosted, com relatórios)
        run: |
          JEST_JUNIT_OUTPUT=junit.xml npm run test:ci --silent

      - name: Upload JUnit report (self-hosted)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-report-self-hosted
          path: junit.xml

      - name: Publish JUnit as check (self-hosted)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Jest Tests (self-hosted)
          path: junit.xml
          reporter: junit

      - name: Upload coverage artifact (self-hosted)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-self-hosted
          path: coverage/

      - name: Upload coverage to Codecov (self-hosted)
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/**/lcov.info
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e-tests-self-hosted:
    runs-on: [self-hosted, linux]
    needs: [inspecao]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Instalando Yarn
        run: npm install -g yarn

      - name: Instalando dependências
        run: yarn

      - name: Instalando Browsers do Playwright (self-hosted)
        run: yarn playwright install

      - name: Executando testes E2E (self-hosted)
        run: yarn run e2e

      - name: Salvando relatórios de testes (self-hosted)
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          path: ./playwright-report
          name: Relatório de Testes E2E (self-hosted)

  deploy:
    runs-on: ubuntu-latest
    needs: [unidade, e2e-tests]

    steps:
      - name: Simulação de Deploy
        run: echo 'Deploy sendo realizado...'
